name: Cross-Platform Build
on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-serialport
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-libvpl
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-flac
            make
      - name: Build & Package
        shell: msys2 {0}
        run: |
          mkdir -p build && cd build
          ar rcs /ucrt64/lib/libdl.a
          cmake .. -G "MSYS Makefiles" -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)

          EXE_PATH=$(find . -name "DomesdayDuplicator.exe")
          cp "$EXE_PATH" .

          windeployqt --release --no-translations --no-opengl-sw DomesdayDuplicator.exe

          # FFmpeg & Hardware Cores
          cp /ucrt64/bin/swresample-*.dll .
          cp /ucrt64/bin/avcodec-*.dll .
          cp /ucrt64/bin/avformat-*.dll .
          cp /ucrt64/bin/avutil-*.dll .
          cp /ucrt64/bin/swscale-*.dll .
          cp /ucrt64/bin/libvpl*.dll .

          # Full dependency list (Static names)
          DEPS=(
            "libgcc_s_seh-1.dll" "libstdc++-6.dll" "libwinpthread-1.dll"
            "libusb-1.0.dll" "libiconv-2.dll" "libintl-8.dll" "zlib1.dll"
            "libpng16-16.dll" "libharfbuzz-0.dll" "libfreetype-6.dll"
            "libglib-2.0-0.dll" "libgraphite2.dll" "libbz2-1.dll"
            "libdouble-conversion.dll" "libmd4c.dll" "libb2-1.dll"
            "libpcre2-16-0.dll" "libpcre2-8-0.dll" "libsoxr.dll" 
            "libva.dll" "libva_win32.dll" "libgomp-1.dll"
          )

          for dll in "${DEPS[@]}"; do
            cp /ucrt64/bin/$dll .
          done

          # ICU wildcards
          cp /ucrt64/bin/libicudt*.dll .
          cp /ucrt64/bin/libicuin*.dll .
          cp /ucrt64/bin/libicuuc*.dll .

          rm -f dddconv.exe dddutil.exe
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: DomesdayDuplicator-Windows
          path: build/
