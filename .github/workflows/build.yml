name: Compact Windows Build

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-serialport
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-flac
            mingw-w64-ucrt-x86_64-libsoxr
            make

      - name: Build & Package (Safe + Working)
        shell: msys2 {0}
        run: |
          mkdir -p build && cd build

          # Conservative but effective static linking
          cmake .. -G "MSYS Makefiles" -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++ \
              -Wl,-Bstatic -lwinpthread -lz -lbcrypt -lws2_32 -ladvapi32 -luser32 -lgdi32 -lwinmm \
              -Wl,--start-group -lsoxr -lflac -Wl,--end-group -Wl,-Bdynamic" \
            -DZLIB_LIBRARY=/ucrt64/lib/libz.a \
            -DLIBUSB_1_LIBRARY=/ucrt64/lib/libusb-1.0.a \
            -DCMAKE_CXX_FLAGS="-static-libgcc -static-libstdc++" \
            -DCMAKE_C_FLAGS="-static-libgcc"

          make -j$(nproc)

          EXE_PATH=$(find . -name "DomesdayDuplicator.exe" | head -n1)
          if [ -z "$EXE_PATH" ]; then
            echo "Error: Executable not found!"
            exit 1
          fi
          cp "$EXE_PATH" DomesdayDuplicator.exe

          # Qt deployment
          windeployqt6 --release --no-translations --no-opengl-sw --no-system-d3d-compiler DomesdayDuplicator.exe

          # Copy EVERYTHING ldd sees (safest way to avoid 0xc000007b)
          echo "Copying all dependencies via ldd..."
          ldd DomesdayDuplicator.exe | grep -E '/ucrt64/' | awk '{print $3}' | xargs -I {} cp -n "{}" . 2>/dev/null || true

          # Extra safety copies for audio/capture
          cp -n /ucrt64/bin/avutil-*.dll      . 2>/dev/null || true
          cp -n /ucrt64/bin/swresample-*.dll  . 2>/dev/null || true
          cp -n /ucrt64/bin/swscale-*.dll     . 2>/dev/null || true

          # Qt plugins
          mkdir -p platforms styles
          cp -n /ucrt64/share/qt6/plugins/platforms/qwindows.dll platforms/ 2>/dev/null || true
          cp -n /ucrt64/share/qt6/plugins/styles/qwindowsvistastyle.dll styles/ 2>/dev/null || true

          # Do NOT remove critical runtime DLLs here (we let ldd handle it)

          # Final cleanup of build junk only
          rm -f dddconv.exe dddutil.exe CMakeCache.txt Makefile cmake_install.cmake *.a *.lib 2>/dev/null || true
          find . -maxdepth 1 -type d ! -name 'platforms' ! -name 'styles' ! -path "." -exec rm -rf {} +

          echo "=== Final contents ==="
          ls -la
          echo "Executable size:"
          ls -lh DomesdayDuplicator.exe

          # Create clean zip for distribution
          zip -r DomesdayDuplicator-Windows.zip ./*

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: DomesdayDuplicator-Compact-Windows
          path: build/
          retention-days: 7

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DomesdayDuplicator-Windows-ZIP
          path: build/DomesdayDuplicator-Windows.zip
          retention-days: 7
