name: Build DomesdayDuplicator

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  BUILD_TYPE: Release

jobs:
  # Linux x64 build
  linux-x64:
    runs-on: ubuntu-22.04
    name: Linux x64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          cmake \
          pkg-config \
          libusb-1.0-0-dev \
          libswresample-dev \
          libavutil-dev \
          qt6-base-dev \
          qt6-base-dev-tools \
          libqt6widgets6 \
          libqt6serialport6-dev
    
    - name: Configure CMake
      working-directory: Linux-Application
      run: |
        export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
        cmake -B build -S . -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
    
    - name: Build
      working-directory: Linux-Application
      run: |
        export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
        cmake --build build --config ${{env.BUILD_TYPE}} -j$(nproc)
    
    - name: Test Application
      working-directory: Linux-Application/build/DomesdayDuplicator
      run: |
        ./DomesdayDuplicator --help
        ldd DomesdayDuplicator | grep -E "(swresample|avutil)" || echo "No FFmpeg libraries found"
    
    - name: Package
      working-directory: Linux-Application
      run: |
        mkdir -p package/DomesdayDuplicator-Linux-x64
        cp build/DomesdayDuplicator/DomesdayDuplicator package/DomesdayDuplicator-Linux-x64/
        cp build/dddconv/dddconv package/DomesdayDuplicator-Linux-x64/
        cp build/dddutil/dddutil package/DomesdayDuplicator-Linux-x64/
        cp DOWNSAMPLING_README.md package/DomesdayDuplicator-Linux-x64/
        cp build_with_system_ffmpeg.sh package/DomesdayDuplicator-Linux-x64/
        chmod +x package/DomesdayDuplicator-Linux-x64/*
        cd package && tar -czf DomesdayDuplicator-Linux-x64.tar.gz DomesdayDuplicator-Linux-x64/
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DomesdayDuplicator-Linux-x64
        path: Linux-Application/package/DomesdayDuplicator-Linux-x64.tar.gz

  # Linux ARM64 build
  linux-arm64:
    runs-on: ubuntu-22.04
    name: Linux ARM64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64
    
    - name: Build in ARM64 container
      run: |
        docker run --rm --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          ubuntu:22.04 bash -c "
            apt update && apt install -y \
              build-essential cmake pkg-config \
              libusb-1.0-0-dev libswresample-dev libavutil-dev \
              qt6-base-dev qt6-base-dev-tools libqt6widgets6 libqt6serialport6-dev
            cd Linux-Application
            export PKG_CONFIG_PATH='/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig'
            cmake -B build -S . -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
            cmake --build build --config ${{env.BUILD_TYPE}} -j\$(nproc)
            mkdir -p package/DomesdayDuplicator-Linux-ARM64
            cp build/DomesdayDuplicator/DomesdayDuplicator package/DomesdayDuplicator-Linux-ARM64/
            cp build/dddconv/dddconv package/DomesdayDuplicator-Linux-ARM64/
            cp build/dddutil/dddutil package/DomesdayDuplicator-Linux-ARM64/
            cp DOWNSAMPLING_README.md package/DomesdayDuplicator-Linux-ARM64/
            cp build_with_system_ffmpeg.sh package/DomesdayDuplicator-Linux-ARM64/
            chmod +x package/DomesdayDuplicator-Linux-ARM64/*
            cd package && tar -czf DomesdayDuplicator-Linux-ARM64.tar.gz DomesdayDuplicator-Linux-ARM64/
        "
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DomesdayDuplicator-Linux-ARM64
        path: Linux-Application/package/DomesdayDuplicator-Linux-ARM64.tar.gz

  # Windows x64 build
  windows-x64:
    runs-on: windows-2022
    name: Windows x64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.0'
        arch: win64_msvc2019_64
        cache: true
    
    - name: Install vcpkg dependencies
      run: |
        vcpkg install libusb:x64-windows ffmpeg:x64-windows
    
    - name: Configure CMake
      working-directory: Linux-Application
      run: |
        cmake -B build -S . -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} `
          -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows
    
    - name: Build
      working-directory: Linux-Application
      run: cmake --build build --config ${{env.BUILD_TYPE}} -j4
    
    - name: Test Application
      working-directory: Linux-Application/build/DomesdayDuplicator/${{env.BUILD_TYPE}}
      run: |
        ./DomesdayDuplicator.exe --help
    
    - name: Package
      working-directory: Linux-Application
      run: |
        mkdir package\DomesdayDuplicator-Windows-x64
        copy build\DomesdayDuplicator\${{env.BUILD_TYPE}}\DomesdayDuplicator.exe package\DomesdayDuplicator-Windows-x64\
        copy build\dddconv\${{env.BUILD_TYPE}}\dddconv.exe package\DomesdayDuplicator-Windows-x64\
        copy build\dddutil\${{env.BUILD_TYPE}}\dddutil.exe package\DomesdayDuplicator-Windows-x64\
        copy DOWNSAMPLING_README.md package\DomesdayDuplicator-Windows-x64\
        windeployqt package\DomesdayDuplicator-Windows-x64\DomesdayDuplicator.exe
        Compress-Archive -Path package\DomesdayDuplicator-Windows-x64 -DestinationPath package\DomesdayDuplicator-Windows-x64.zip
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DomesdayDuplicator-Windows-x64
        path: Linux-Application/package/DomesdayDuplicator-Windows-x64.zip

  # macOS x64 build
  macos-x64:
    runs-on: macos-12
    name: macOS x64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        brew update
        brew install cmake pkg-config libusb ffmpeg qt@6
        echo "$(brew --prefix qt@6)/bin" >> $GITHUB_PATH
        echo "PKG_CONFIG_PATH=$(brew --prefix ffmpeg)/lib/pkgconfig:$(brew --prefix libusb)/lib/pkgconfig" >> $GITHUB_ENV
    
    - name: Configure CMake
      working-directory: Linux-Application
      run: |
        cmake -B build -S . -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6);$(brew --prefix libusb);$(brew --prefix ffmpeg)"
    
    - name: Build
      working-directory: Linux-Application
      run: cmake --build build --config ${{env.BUILD_TYPE}} -j$(sysctl -n hw.ncpu)
    
    - name: Test Application
      working-directory: Linux-Application/build/DomesdayDuplicator
      run: |
        ./DomesdayDuplicator --help
        otool -L DomesdayDuplicator | grep -E "(swresample|avutil)" || echo "No FFmpeg libraries found"
    
    - name: Package
      working-directory: Linux-Application
      run: |
        mkdir -p package/DomesdayDuplicator-macOS-x64
        cp build/DomesdayDuplicator/DomesdayDuplicator package/DomesdayDuplicator-macOS-x64/
        cp build/dddconv/dddconv package/DomesdayDuplicator-macOS-x64/
        cp build/dddutil/dddutil package/DomesdayDuplicator-macOS-x64/
        cp DOWNSAMPLING_README.md package/DomesdayDuplicator-macOS-x64/
        chmod +x package/DomesdayDuplicator-macOS-x64/*
        cd package && tar -czf DomesdayDuplicator-macOS-x64.tar.gz DomesdayDuplicator-macOS-x64/
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DomesdayDuplicator-macOS-x64
        path: Linux-Application/package/DomesdayDuplicator-macOS-x64.tar.gz

  # macOS ARM64 build
  macos-arm64:
    runs-on: macos-14
    name: macOS ARM64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        brew update
        brew install cmake pkg-config libusb ffmpeg qt@6
        echo "$(brew --prefix qt@6)/bin" >> $GITHUB_PATH
        echo "PKG_CONFIG_PATH=$(brew --prefix ffmpeg)/lib/pkgconfig:$(brew --prefix libusb)/lib/pkgconfig" >> $GITHUB_ENV
    
    - name: Configure CMake
      working-directory: Linux-Application
      run: |
        cmake -B build -S . -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6);$(brew --prefix libusb);$(brew --prefix ffmpeg)"
    
    - name: Build
      working-directory: Linux-Application
      run: cmake --build build --config ${{env.BUILD_TYPE}} -j$(sysctl -n hw.ncpu)
    
    - name: Test Application
      working-directory: Linux-Application/build/DomesdayDuplicator
      run: |
        ./DomesdayDuplicator --help
        otool -L DomesdayDuplicator | grep -E "(swresample|avutil)" || echo "No FFmpeg libraries found"
    
    - name: Package
      working-directory: Linux-Application
      run: |
        mkdir -p package/DomesdayDuplicator-macOS-ARM64
        cp build/DomesdayDuplicator/DomesdayDuplicator package/DomesdayDuplicator-macOS-ARM64/
        cp build/dddconv/dddconv package/DomesdayDuplicator-macOS-ARM64/
        cp build/dddutil/dddutil package/DomesdayDuplicator-macOS-ARM64/
        cp DOWNSAMPLING_README.md package/DomesdayDuplicator-macOS-ARM64/
        chmod +x package/DomesdayDuplicator-macOS-ARM64/*
        cd package && tar -czf DomesdayDuplicator-macOS-ARM64.tar.gz DomesdayDuplicator-macOS-ARM64/
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DomesdayDuplicator-macOS-ARM64
        path: Linux-Application/package/DomesdayDuplicator-macOS-ARM64.tar.gz

  # Create release if this is a tag push
  release:
    needs: [linux-x64, linux-arm64, windows-x64, macos-x64, macos-arm64]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/DomesdayDuplicator-Linux-x64/DomesdayDuplicator-Linux-x64.tar.gz
          artifacts/DomesdayDuplicator-Linux-ARM64/DomesdayDuplicator-Linux-ARM64.tar.gz
          artifacts/DomesdayDuplicator-Windows-x64/DomesdayDuplicator-Windows-x64.zip
          artifacts/DomesdayDuplicator-macOS-x64/DomesdayDuplicator-macOS-x64.tar.gz
          artifacts/DomesdayDuplicator-macOS-ARM64/DomesdayDuplicator-macOS-ARM64.tar.gz
        token: ${{ secrets.GITHUB_TOKEN }}
