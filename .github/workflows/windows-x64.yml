name: Windows x64 Build

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'Linux-Application/**'
      - '.github/workflows/windows-x64.yml'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'Linux-Application/**'
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-windows-x64:
    runs-on: windows-2022
    name: Windows x64 Build & Test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: System Information
      run: |
        echo "=== Windows System Information ==="
        systeminfo | findstr /B /C:"OS Name" /C:"OS Version" /C:"System Type" /C:"Total Physical Memory"
        echo "PowerShell Version:"
        $PSVersionTable.PSVersion
        echo "==============================="
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-make
          mingw-w64-x86_64-pkg-config
          mingw-w64-x86_64-libusb
          mingw-w64-x86_64-ffmpeg
          mingw-w64-x86_64-qt6-base
          mingw-w64-x86_64-qt6-tools
          mingw-w64-x86_64-qt6-serialport
          file
          tar
    
    - name: Verify MSYS2 Environment
      shell: msys2 {0}
      run: |
        echo "=== MSYS2 Environment Information ==="
        uname -a
        echo "Compiler versions:"
        gcc --version | head -1
        echo "CMake version:"
        cmake --version
        echo "PKG-CONFIG version:"
        pkg-config --version
        echo "Qt6 version:"
        qmake --version || echo "qmake not found"
        echo "====================================="
    
    - name: Check Library Detection
      shell: msys2 {0}
      working-directory: Linux-Application
      run: |
        export PKG_CONFIG_PATH="/mingw64/lib/pkgconfig"
        echo "PKG_CONFIG_PATH: $PKG_CONFIG_PATH"
        
        echo "=== Library Detection ==="
        pkg-config --exists libswresample && echo "✓ libswresample found" || echo "✗ libswresample not found"
        pkg-config --exists libavutil && echo "✓ libavutil found" || echo "✗ libavutil not found" 
        pkg-config --exists libusb-1.0 && echo "✓ libusb-1.0 found" || echo "✗ libusb-1.0 not found"
        
        echo "Library versions:"
        pkg-config --modversion libswresample libavutil libusb-1.0
        
        echo "Library paths:"
        pkg-config --libs libswresample libavutil libusb-1.0
        echo "=========================="
    
    - name: Configure CMake
      shell: msys2 {0}
      working-directory: Linux-Application
      run: |
        export PKG_CONFIG_PATH="/mingw64/lib/pkgconfig"
        
        echo "=== CMake Configuration ==="
        cmake -B build -S . \
          -DCMAKE_BUILD_TYPE=Release \
          -G "MSYS Makefiles" \
          -DCMAKE_VERBOSE_MAKEFILE=ON
    
    - name: Build
      shell: msys2 {0}
      working-directory: Linux-Application
      run: |
        echo "=== Building ==="
        cmake --build build --config Release -j$(nproc) --verbose
    
    - name: Test Executables
      shell: msys2 {0}
      working-directory: Linux-Application
      run: |
        echo "=== Testing Executables ==="
        
        # Check if executables exist
        ls -la build/DomesdayDuplicator/DomesdayDuplicator.exe
        ls -la build/dddconv/dddconv.exe
        ls -la build/dddutil/dddutil.exe
        
        # Check executable architecture
        echo "Checking executable architectures:"
        file build/DomesdayDuplicator/DomesdayDuplicator.exe
        file build/dddconv/dddconv.exe
        file build/dddutil/dddutil.exe
        
        # Test version output
        echo "Testing DomesdayDuplicator:"
        build/DomesdayDuplicator/DomesdayDuplicator.exe --version || echo "Version test failed"
        
        echo "Testing dddconv:"
        build/dddconv/dddconv.exe --version || echo "Version test failed"
        
        echo "Testing dddutil:"
        build/dddutil/dddutil.exe --version || echo "Version test failed"
        
        # Test help output (with timeout)
        echo "Testing help commands:"
        timeout 10 build/DomesdayDuplicator/DomesdayDuplicator.exe --help || echo "Help test completed"
        timeout 10 build/dddconv/dddconv.exe --help || echo "Help test completed"
        timeout 10 build/dddutil/dddutil.exe --help || echo "Help test completed"
    
    - name: Check Dependencies
      shell: msys2 {0}
      working-directory: Linux-Application
      run: |
        echo "=== Checking Runtime Dependencies ==="
        echo "DomesdayDuplicator dependencies:"
        ldd build/DomesdayDuplicator/DomesdayDuplicator.exe | grep -E "(Qt|usb|swresample|avutil|mingw)" || true
        
        echo "dddconv dependencies:"
        ldd build/dddconv/dddconv.exe | grep -E "(Qt|usb|swresample|avutil|mingw)" || true
        
        echo "dddutil dependencies:"
        ldd build/dddutil/dddutil.exe | grep -E "(Qt|usb|swresample|avutil|mingw)" || true
    
    - name: AudioResampler Test
      shell: msys2 {0}
      working-directory: Linux-Application
      run: |
        echo "=== Testing AudioResampler Functionality ==="
        
        # Create test program
        cat > test_resampler.cpp << 'EOF'
        #include "DomesdayDuplicator/AudioResampler.h"
        #include <iostream>
        #include <vector>
        #include <cmath>
        
        #ifndef M_PI
        #define M_PI 3.14159265358979323846
        #endif
        
        int main() {
            try {
                AudioResampler resampler;
                
                // Test initialization
                if (!resampler.initialize(48000, 24000, AV_SAMPLE_FMT_S16)) {
                    std::cerr << "Failed to initialize resampler" << std::endl;
                    return 1;
                }
                
                // Generate test sine wave (1000 samples at 48kHz)
                std::vector<int16_t> input_samples(1000);
                for (int i = 0; i < 1000; ++i) {
                    input_samples[i] = static_cast<int16_t>(16000 * sin(2 * M_PI * 440 * i / 48000.0));
                }
                
                // Perform downsampling
                std::vector<int16_t> output_samples;
                if (!resampler.resample(input_samples, output_samples)) {
                    std::cerr << "Resampling failed" << std::endl;
                    return 1;
                }
                
                // Check output
                std::cout << "Input samples: " << input_samples.size() << std::endl;
                std::cout << "Output samples: " << output_samples.size() << std::endl;
                
                // Expected roughly half the samples (48kHz -> 24kHz)
                double ratio = static_cast<double>(output_samples.size()) / input_samples.size();
                std::cout << "Sample ratio: " << ratio << std::endl;
                
                if (ratio > 0.4 && ratio < 0.6) {
                    std::cout << "✓ AudioResampler test PASSED" << std::endl;
                    return 0;
                } else {
                    std::cerr << "✗ AudioResampler test FAILED: unexpected ratio" << std::endl;
                    return 1;
                }
                
            } catch (const std::exception& e) {
                std::cerr << "Exception: " << e.what() << std::endl;
                return 1;
            }
        }
        EOF
        
        # Compile and run test
        g++ -std=c++17 -I. test_resampler.cpp build/DomesdayDuplicator/AudioResampler.o \
            $(pkg-config --cflags --libs libswresample libavutil) \
            -o test_resampler.exe
        
        ./test_resampler.exe
    
    - name: Collect Required DLLs
      shell: msys2 {0}
      working-directory: Linux-Application
      run: |
        echo "=== Collecting Required DLLs ==="
        mkdir -p dll_temp
        
        # Function to copy DLL and its dependencies recursively
        copy_dll_deps() {
            local exe_path="$1"
            local target_dir="$2"
            
            echo "Analyzing dependencies for: $exe_path"
            ldd "$exe_path" | grep mingw64 | awk '{print $3}' | while read dll; do
                if [[ -n "$dll" && -f "$dll" ]]; then
                    dll_name=$(basename "$dll")
                    if [[ ! -f "$target_dir/$dll_name" ]]; then
                        echo "Copying: $dll_name"
                        cp "$dll" "$target_dir/"
                    fi
                fi
            done
        }
        
        # Copy DLLs for each executable
        copy_dll_deps "build/DomesdayDuplicator/DomesdayDuplicator.exe" "dll_temp"
        copy_dll_deps "build/dddconv/dddconv.exe" "dll_temp"
        copy_dll_deps "build/dddutil/dddutil.exe" "dll_temp"
        
        echo "Collected DLLs:"
        ls -la dll_temp/
    
    - name: Package Artifacts
      shell: msys2 {0}
      working-directory: Linux-Application
      run: |
        echo "=== Packaging ==="
        mkdir -p artifacts/DomesdayDuplicator-Windows-x64
        
        # Copy executables
        cp build/DomesdayDuplicator/DomesdayDuplicator.exe artifacts/DomesdayDuplicator-Windows-x64/
        cp build/dddconv/dddconv.exe artifacts/DomesdayDuplicator-Windows-x64/
        cp build/dddutil/dddutil.exe artifacts/DomesdayDuplicator-Windows-x64/
        
        # Copy documentation
        cp DOWNSAMPLING_README.md artifacts/DomesdayDuplicator-Windows-x64/
        cp ../README.md artifacts/DomesdayDuplicator-Windows-x64/
        
        # Copy required DLLs
        if [ -d "dll_temp" ] && [ "$(ls -A dll_temp)" ]; then
            cp dll_temp/*.dll artifacts/DomesdayDuplicator-Windows-x64/ || echo "No DLLs to copy"
        fi
        
        # Create version info file
        echo "Build Information:" > artifacts/DomesdayDuplicator-Windows-x64/BUILD_INFO.txt
        echo "Build Date: $(date)" >> artifacts/DomesdayDuplicator-Windows-x64/BUILD_INFO.txt
        echo "Platform: Windows x64 (MSYS2/MinGW64)" >> artifacts/DomesdayDuplicator-Windows-x64/BUILD_INFO.txt
        echo "Architecture: $(uname -m)" >> artifacts/DomesdayDuplicator-Windows-x64/BUILD_INFO.txt
        echo "Commit: ${{ github.sha }}" >> artifacts/DomesdayDuplicator-Windows-x64/BUILD_INFO.txt
        echo "Branch: ${{ github.ref_name }}" >> artifacts/DomesdayDuplicator-Windows-x64/BUILD_INFO.txt
        
        # Create installation script
        cat > artifacts/DomesdayDuplicator-Windows-x64/INSTALL.bat << 'EOF'
        @echo off
        echo DomesdayDuplicator Windows Installation
        echo ====================================
        echo.
        echo This package contains the DomesdayDuplicator suite for Windows:
        echo - DomesdayDuplicator.exe: Main GUI application
        echo - dddconv.exe: Audio conversion utility
        echo - dddutil.exe: Utility tools
        echo.
        echo All required DLLs are included in this directory.
        echo.
        echo To run the GUI application:
        echo   DomesdayDuplicator.exe
        echo.
        echo For command-line tools, see:
        echo   dddconv.exe --help
        echo   dddutil.exe --help
        echo.
        pause
        EOF
        
        tar -czf DomesdayDuplicator-Windows-x64.tar.gz -C artifacts DomesdayDuplicator-Windows-x64
        ls -la DomesdayDuplicator-Windows-x64.tar.gz
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DomesdayDuplicator-Windows-x64
        path: Linux-Application/DomesdayDuplicator-Windows-x64.tar.gz
        retention-days: 30
