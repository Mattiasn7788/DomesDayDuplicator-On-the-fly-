name: ARM64 Build

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'Linux-Application/**'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'Linux-Application/**'
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-22.04
    name: Linux ARM64 Cross-Build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64
    
    - name: Build ARM64
      run: |
        docker run --rm --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace/Linux-Application \
          ubuntu:22.04 bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt update
            apt install -y \
              build-essential cmake pkg-config \
              libusb-1.0-0-dev libswresample-dev libavutil-dev \
              qt6-base-dev qt6-base-dev-tools libqt6widgets6 libqt6serialport6-dev
            
            export PKG_CONFIG_PATH='/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig'
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
            cmake --build build --config Release -j\$(nproc)
            
            echo '=== Testing ARM64 Build ==='
            build/DomesdayDuplicator/DomesdayDuplicator --version
            file build/DomesdayDuplicator/DomesdayDuplicator
            
            echo '=== Packaging ==='
            mkdir -p package/DomesdayDuplicator-Linux-ARM64
            cp build/DomesdayDuplicator/DomesdayDuplicator package/DomesdayDuplicator-Linux-ARM64/
            cp build/dddconv/dddconv package/DomesdayDuplicator-Linux-ARM64/
            cp build/dddutil/dddutil package/DomesdayDuplicator-Linux-ARM64/
            cp DOWNSAMPLING_README.md package/DomesdayDuplicator-Linux-ARM64/
            cp ../README.md package/DomesdayDuplicator-Linux-ARM64/
            tar -czf DomesdayDuplicator-Linux-ARM64.tar.gz -C package DomesdayDuplicator-Linux-ARM64
        "
    
    - name: Upload ARM64 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DomesdayDuplicator-Linux-ARM64
        path: Linux-Application/DomesdayDuplicator-Linux-ARM64.tar.gz
        retention-days: 30
