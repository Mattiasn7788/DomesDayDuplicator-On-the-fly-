name: Release

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for release'
        required: true
        default: 'v2.3.0-downsampling'

jobs:
  create-release:
    runs-on: ubuntu-22.04
    name: Create Release Build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          cmake \
          pkg-config \
          libusb-1.0-0-dev \
          libswresample-dev \
          libavutil-dev \
          qt6-base-dev \
          qt6-base-dev-tools \
          libqt6widgets6 \
          libqt6serialport6-dev
    
    - name: Build Release
      working-directory: Linux-Application
      run: |
        export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release -j$(nproc)
    
    - name: Package Release
      working-directory: Linux-Application
      run: |
        mkdir -p release/DomesdayDuplicator-Linux-x64
        cp build/DomesdayDuplicator/DomesdayDuplicator release/DomesdayDuplicator-Linux-x64/
        cp build/dddconv/dddconv release/DomesdayDuplicator-Linux-x64/
        cp build/dddutil/dddutil release/DomesdayDuplicator-Linux-x64/
        cp DOWNSAMPLING_README.md release/DomesdayDuplicator-Linux-x64/
        cp build_with_system_ffmpeg.sh release/DomesdayDuplicator-Linux-x64/
        cp ../README.md release/DomesdayDuplicator-Linux-x64/
        
        # Create version info
        cat > release/DomesdayDuplicator-Linux-x64/VERSION.txt << EOF
        DomesdayDuplicator Release Build
        Version: ${{ github.event.inputs.version || github.ref_name || 'development' }}
        Build Date: $(date)
        Platform: Linux x64 (Ubuntu 22.04)
        Commit: ${{ github.sha }}
        
        New Features:
        - Real-time downsampling support with AudioResampler
        - 16-bit signed audio capture at half and quarter rates
        - System FFmpeg integration (no Homebrew dependency)
        - Improved cross-platform compatibility
        
        Prerequisites:
        - libusb-1.0-0
        - libswresample3
        - libavutil56  
        - qt6-base
        
        Install with: sudo apt install libusb-1.0-0 libswresample3 libavutil56 qt6-base
        EOF
        
        chmod +x release/DomesdayDuplicator-Linux-x64/*
        tar -czf DomesdayDuplicator-Release-Linux-x64.tar.gz -C release DomesdayDuplicator-Linux-x64
    
    - name: Get version
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION="${{ github.ref_name }}"
        else
          VERSION="v2.3.0-downsampling-$(date +%Y%m%d)"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
    
    - name: Create GitHub Release
      uses: actions/create-release@v1
      id: create_release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.version }}
        release_name: DomesdayDuplicator ${{ steps.version.outputs.version }}
        body: |
          ## DomesdayDuplicator ${{ steps.version.outputs.version }}
          
          ### Real-time Downsampling Release
          
          This release adds major improvements for real-time audio downsampling during LaserDisc RF capture.
          
          #### New Features
          - **Real-time downsampling** with AudioResampler class
          - **16-bit signed audio capture** at half-rate (20 MSPS) and quarter-rate (10 MSPS)
          - **System FFmpeg integration** - no more Homebrew/Linuxbrew dependency
          - **Cross-platform compatibility** improvements
          
          #### Technical Improvements
          - High-quality resampling using FFmpeg's libswresample
          - Memory-efficient chunk processing
          - Proper anti-aliasing filters
          - Clean repository with comprehensive .gitignore
          
          #### Installation
          **Linux (Ubuntu/Debian):**
          ```bash
          sudo apt install libusb-1.0-0 libswresample3 libavutil56 qt6-base
          tar -xzf DomesdayDuplicator-Release-Linux-x64.tar.gz
          cd DomesdayDuplicator-Linux-x64
          ./DomesdayDuplicator
          ```
          
          See `DOWNSAMPLING_README.md` for detailed documentation.
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: Linux-Application/DomesdayDuplicator-Release-Linux-x64.tar.gz
        asset_name: DomesdayDuplicator-Release-Linux-x64.tar.gz
        asset_content_type: application/gzip
