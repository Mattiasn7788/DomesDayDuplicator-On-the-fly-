name: Release Build

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
      - 'V*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to create release for'
        required: true
        default: 'v2.3.0-downsampling'
        type: string

env:
  BUILD_TYPE: Release

jobs:
  # Linux x64 Release Build
  build-linux-x64:
    runs-on: ubuntu-22.04
    name: Build Linux x64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          cmake \
          pkg-config \
          libusb-1.0-0-dev \
          libswresample-dev \
          libavutil-dev \
          qt6-base-dev \
          qt6-base-dev-tools \
          libqt6widgets6 \
          libqt6serialport6-dev
    
    - name: Configure and Build
      working-directory: Linux-Application
      run: |
        export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release -j$(nproc)
    
    - name: Test executables
      working-directory: Linux-Application
      run: |
        build/DomesdayDuplicator/DomesdayDuplicator --version
        build/dddconv/dddconv --version
        build/dddutil/dddutil --version
    
    - name: Package artifacts
      working-directory: Linux-Application
      run: |
        mkdir -p artifacts/DomesdayDuplicator-Linux-x64
        cp build/DomesdayDuplicator/DomesdayDuplicator artifacts/DomesdayDuplicator-Linux-x64/
        cp build/dddconv/dddconv artifacts/DomesdayDuplicator-Linux-x64/
        cp build/dddutil/dddutil artifacts/DomesdayDuplicator-Linux-x64/
        cp DOWNSAMPLING_README.md artifacts/DomesdayDuplicator-Linux-x64/
        cp build_with_system_ffmpeg.sh artifacts/DomesdayDuplicator-Linux-x64/
        cp ../README.md artifacts/DomesdayDuplicator-Linux-x64/
        tar -czf DomesdayDuplicator-Linux-x64.tar.gz -C artifacts DomesdayDuplicator-Linux-x64
    
    - name: Upload Linux x64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: DomesdayDuplicator-Linux-x64
        path: Linux-Application/DomesdayDuplicator-Linux-x64.tar.gz

  # Linux ARM64 Release Build
  build-linux-arm64:
    runs-on: ubuntu-22.04
    name: Build Linux ARM64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64
    
    - name: Build in ARM64 container
      run: |
        docker run --rm --platform=linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace/Linux-Application \
          ubuntu:22.04 bash -c '
          apt update && apt install -y \
            build-essential \
            cmake \
            pkg-config \
            libusb-1.0-0-dev \
            libswresample-dev \
            libavutil-dev \
            qt6-base-dev \
            qt6-base-dev-tools \
            libqt6widgets6 \
            libqt6serialport6-dev
          
          export PKG_CONFIG_PATH="/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)
          
          # Test executables
          build/DomesdayDuplicator/DomesdayDuplicator --version
          build/dddconv/dddconv --version  
          build/dddutil/dddutil --version
          
          # Package
          mkdir -p artifacts/DomesdayDuplicator-Linux-ARM64
          cp build/DomesdayDuplicator/DomesdayDuplicator artifacts/DomesdayDuplicator-Linux-ARM64/
          cp build/dddconv/dddconv artifacts/DomesdayDuplicator-Linux-ARM64/
          cp build/dddutil/dddutil artifacts/DomesdayDuplicator-Linux-ARM64/
          cp DOWNSAMPLING_README.md artifacts/DomesdayDuplicator-Linux-ARM64/
          cp build_with_system_ffmpeg.sh artifacts/DomesdayDuplicator-Linux-ARM64/
          cp ../README.md artifacts/DomesdayDuplicator-Linux-ARM64/
          tar -czf DomesdayDuplicator-Linux-ARM64.tar.gz -C artifacts DomesdayDuplicator-Linux-ARM64
        '
    
    - name: Upload Linux ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: DomesdayDuplicator-Linux-ARM64
        path: Linux-Application/DomesdayDuplicator-Linux-ARM64.tar.gz

  # Windows x64 Release Build
  build-windows-x64:
    runs-on: windows-2022
    name: Build Windows x64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-make
          mingw-w64-x86_64-pkg-config
          mingw-w64-x86_64-libusb
          mingw-w64-x86_64-ffmpeg
          mingw-w64-x86_64-qt6-base
          mingw-w64-x86_64-qt6-tools
          mingw-w64-x86_64-qt6-serialport
    
    - name: Configure and Build
      shell: msys2 {0}
      working-directory: Linux-Application
      run: |
        export PKG_CONFIG_PATH="/mingw64/lib/pkgconfig"
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G "MSYS Makefiles"
        cmake --build build --config Release -j$(nproc)
    
    - name: Test executables
      shell: msys2 {0}
      working-directory: Linux-Application
      run: |
        build/DomesdayDuplicator/DomesdayDuplicator.exe --version
        build/dddconv/dddconv.exe --version
        build/dddutil/dddutil.exe --version
    
    - name: Package artifacts
      shell: msys2 {0}
      working-directory: Linux-Application
      run: |
        mkdir -p artifacts/DomesdayDuplicator-Windows-x64
        cp build/DomesdayDuplicator/DomesdayDuplicator.exe artifacts/DomesdayDuplicator-Windows-x64/
        cp build/dddconv/dddconv.exe artifacts/DomesdayDuplicator-Windows-x64/
        cp build/dddutil/dddutil.exe artifacts/DomesdayDuplicator-Windows-x64/
        cp DOWNSAMPLING_README.md artifacts/DomesdayDuplicator-Windows-x64/
        cp ../README.md artifacts/DomesdayDuplicator-Windows-x64/
        
        # Copy required DLLs
        ldd build/DomesdayDuplicator/DomesdayDuplicator.exe | grep mingw64 | awk '{print $3}' | xargs -I {} cp {} artifacts/DomesdayDuplicator-Windows-x64/ || true
        
        tar -czf DomesdayDuplicator-Windows-x64.tar.gz -C artifacts DomesdayDuplicator-Windows-x64
    
    - name: Upload Windows x64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: DomesdayDuplicator-Windows-x64
        path: Linux-Application/DomesdayDuplicator-Windows-x64.tar.gz

  # macOS x64 Release Build
  build-macos-x64:
    runs-on: macos-13  # Intel runner
    name: Build macOS x64 (Intel)
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        brew install cmake pkg-config libusb ffmpeg qt6
        
        # Verify installations
        cmake --version
        pkg-config --version
        ffmpeg -version || true
    
    - name: Configure and Build
      working-directory: Linux-Application
      run: |
        export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig"
        export Qt6_DIR="$(brew --prefix qt6)/lib/cmake/Qt6"
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release -j$(sysctl -n hw.ncpu)
    
    - name: Test executables
      working-directory: Linux-Application
      run: |
        build/DomesdayDuplicator/DomesdayDuplicator --version
        build/dddconv/dddconv --version
        build/dddutil/dddutil --version
    
    - name: Package artifacts
      working-directory: Linux-Application
      run: |
        mkdir -p artifacts/DomesdayDuplicator-macOS-x64
        cp build/DomesdayDuplicator/DomesdayDuplicator artifacts/DomesdayDuplicator-macOS-x64/
        cp build/dddconv/dddconv artifacts/DomesdayDuplicator-macOS-x64/
        cp build/dddutil/dddutil artifacts/DomesdayDuplicator-macOS-x64/
        cp DOWNSAMPLING_README.md artifacts/DomesdayDuplicator-macOS-x64/
        cp build_with_system_ffmpeg.sh artifacts/DomesdayDuplicator-macOS-x64/
        cp ../README.md artifacts/DomesdayDuplicator-macOS-x64/
        tar -czf DomesdayDuplicator-macOS-x64.tar.gz -C artifacts DomesdayDuplicator-macOS-x64
    
    - name: Upload macOS x64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: DomesdayDuplicator-macOS-x64
        path: Linux-Application/DomesdayDuplicator-macOS-x64.tar.gz

  # macOS ARM64 Release Build
  build-macos-arm64:
    runs-on: macos-14  # Apple Silicon runner
    name: Build macOS ARM64 (Apple Silicon)
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        brew install cmake pkg-config libusb ffmpeg qt6
        
        # Verify installations
        cmake --version
        pkg-config --version
        ffmpeg -version || true
    
    - name: Configure and Build
      working-directory: Linux-Application
      run: |
        export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig"
        export Qt6_DIR="$(brew --prefix qt6)/lib/cmake/Qt6"
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release -j$(sysctl -n hw.ncpu)
    
    - name: Test executables
      working-directory: Linux-Application
      run: |
        build/DomesdayDuplicator/DomesdayDuplicator --version
        build/dddconv/dddconv --version
        build/dddutil/dddutil --version
    
    - name: Package artifacts
      working-directory: Linux-Application
      run: |
        mkdir -p artifacts/DomesdayDuplicator-macOS-ARM64
        cp build/DomesdayDuplicator/DomesdayDuplicator artifacts/DomesdayDuplicator-macOS-ARM64/
        cp build/dddconv/dddconv artifacts/DomesdayDuplicator-macOS-ARM64/
        cp build/dddutil/dddutil artifacts/DomesdayDuplicator-macOS-ARM64/
        cp DOWNSAMPLING_README.md artifacts/DomesdayDuplicator-macOS-ARM64/
        cp build_with_system_ffmpeg.sh artifacts/DomesdayDuplicator-macOS-ARM64/
        cp ../README.md artifacts/DomesdayDuplicator-macOS-ARM64/
        tar -czf DomesdayDuplicator-macOS-ARM64.tar.gz -C artifacts DomesdayDuplicator-macOS-ARM64
    
    - name: Upload macOS ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: DomesdayDuplicator-macOS-ARM64
        path: Linux-Application/DomesdayDuplicator-macOS-ARM64.tar.gz

  # Create Release and Upload Assets
  create-release:
    needs: [build-linux-x64, build-linux-arm64, build-windows-x64, build-macos-x64, build-macos-arm64]
    runs-on: ubuntu-22.04
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts
    
    - name: List artifacts
      run: |
        echo "Downloaded artifacts:"
        find release-artifacts -type f -name "*.tar.gz" -exec ls -la {} \;
    
    - name: Get version info
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION="${{ github.ref_name }}"
        else
          VERSION="v2.3.0-downsampling-$(date +%Y%m%d)"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.version }}
        release_name: DomesdayDuplicator ${{ steps.version.outputs.version }}
        body: |
          ## DomesdayDuplicator ${{ steps.version.outputs.version }}
          
          ### 🎉 Real-time Downsampling Release
          
          This release includes major improvements for real-time audio downsampling:
          
          #### ✨ New Features
          - **Real-time downsampling support** with AudioResampler class  
          - **16-bit signed audio capture** at half-rate and quarter-rate
          - **System FFmpeg integration** - no more Homebrew/Linuxbrew dependency
          - **Improved build system** with cross-platform compatibility
          
          #### 🏗️ Build Improvements  
          - Automated cross-platform builds for all major architectures
          - Comprehensive CI/CD with testing and quality checks
          - Clean repository with proper .gitignore
          - System library detection and validation
          
          #### 📦 Platform Support
          - **Linux x64** (Ubuntu 20.04+)
          - **Linux ARM64** (64-bit ARM processors)
          - **Windows x64** (Windows 10/11)
          - **macOS x64** (Intel Macs)
          - **macOS ARM64** (Apple Silicon Macs)
          
          #### 📖 Documentation
          - Comprehensive downsampling documentation
          - Updated build instructions for system FFmpeg
          - Cross-platform build guides
          
          See `DOWNSAMPLING_README.md` for detailed usage instructions.
        draft: false
        prerelease: false
    
    - name: Upload Linux x64 Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: release-artifacts/DomesdayDuplicator-Linux-x64/DomesdayDuplicator-Linux-x64.tar.gz
        asset_name: DomesdayDuplicator-Linux-x64.tar.gz
        asset_content_type: application/gzip
    
    - name: Upload Linux ARM64 Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: release-artifacts/DomesdayDuplicator-Linux-ARM64/DomesdayDuplicator-Linux-ARM64.tar.gz
        asset_name: DomesdayDuplicator-Linux-ARM64.tar.gz
        asset_content_type: application/gzip
    
    - name: Upload Windows x64 Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: release-artifacts/DomesdayDuplicator-Windows-x64/DomesdayDuplicator-Windows-x64.tar.gz
        asset_name: DomesdayDuplicator-Windows-x64.tar.gz
        asset_content_type: application/gzip
    
    - name: Upload macOS x64 Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: release-artifacts/DomesdayDuplicator-macOS-x64/DomesdayDuplicator-macOS-x64.tar.gz
        asset_name: DomesdayDuplicator-macOS-x64.tar.gz
        asset_content_type: application/gzip
    
    - name: Upload macOS ARM64 Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: release-artifacts/DomesdayDuplicator-macOS-ARM64/DomesdayDuplicator-macOS-ARM64.tar.gz
        asset_name: DomesdayDuplicator-macOS-ARM64.tar.gz
        asset_content_type: application/gzip
