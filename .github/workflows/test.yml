name: Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

jobs:
  # Basic build test
  test-build:
    runs-on: ubuntu-22.04
    name: Build Test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          cmake \
          pkg-config \
          libusb-1.0-0-dev \
          libswresample-dev \
          libavutil-dev \
          qt6-base-dev \
          qt6-base-dev-tools \
          libqt6widgets6 \
          libqt6serialport6-dev
    
    - name: Build and Test
      working-directory: Linux-Application
      run: |
        export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
        
        echo "=== CMake Configuration ==="
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug
        
        echo "=== Building ==="
        cmake --build build --config Debug -j$(nproc)
        
        echo "=== Testing Executables ==="
        build/DomesdayDuplicator/DomesdayDuplicator --version
        
        echo "=== Library Check ==="
        ldd build/DomesdayDuplicator/DomesdayDuplicator | grep swresample || echo "libswresample not linked"
        ldd build/DomesdayDuplicator/DomesdayDuplicator | grep avutil || echo "libavutil not linked"

  # AudioResampler functionality test
  test-resampler:
    runs-on: ubuntu-22.04
    name: AudioResampler Test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          cmake \
          pkg-config \
          libusb-1.0-0-dev \
          libswresample-dev \
          libavutil-dev \
          qt6-base-dev \
          qt6-base-dev-tools \
          libqt6widgets6 \
          libqt6serialport6-dev
    
    - name: Build and Test AudioResampler
      working-directory: Linux-Application
      run: |
        export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
        
        # Build the project
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release -j$(nproc)
        
        # Create AudioResampler test
        cat > test_resampler.cpp << 'EOF'
        #include "DomesdayDuplicator/AudioResampler.h"
        #include <iostream>
        #include <vector>
        #include <cmath>
        
        int main() {
            try {
                AudioResampler resampler;
                
                // Test initialization - 48kHz to 24kHz
                if (!resampler.initialize(48000, 24000, AV_SAMPLE_FMT_S16)) {
                    std::cerr << "Failed to initialize resampler" << std::endl;
                    return 1;
                }
                
                // Generate test sine wave
                std::vector<int16_t> input_samples(2000);
                for (size_t i = 0; i < input_samples.size(); ++i) {
                    input_samples[i] = static_cast<int16_t>(16000 * sin(2 * M_PI * 440 * i / 48000.0));
                }
                
                // Perform resampling
                std::vector<int16_t> output_samples;
                if (!resampler.resample(input_samples, output_samples)) {
                    std::cerr << "Resampling failed" << std::endl;
                    return 1;
                }
                
                // Check results
                double ratio = static_cast<double>(output_samples.size()) / input_samples.size();
                std::cout << "Input samples: " << input_samples.size() << std::endl;
                std::cout << "Output samples: " << output_samples.size() << std::endl;
                std::cout << "Ratio: " << ratio << std::endl;
                
                // Expected ratio should be around 0.5 (48kHz -> 24kHz)
                if (ratio > 0.4 && ratio < 0.6) {
                    std::cout << "✓ AudioResampler test PASSED" << std::endl;
                    return 0;
                } else {
                    std::cerr << "✗ AudioResampler test FAILED: unexpected ratio " << ratio << std::endl;
                    return 1;
                }
                
            } catch (const std::exception& e) {
                std::cerr << "Exception: " << e.what() << std::endl;
                return 1;
            }
        }
        EOF
        
        # Compile and run the test
        g++ -std=c++17 -I. test_resampler.cpp build/DomesdayDuplicator/AudioResampler.o \
            $(pkg-config --cflags --libs libswresample libavutil) \
            -o test_resampler
        
        ./test_resampler
