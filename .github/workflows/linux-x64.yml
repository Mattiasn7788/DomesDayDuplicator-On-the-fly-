name: Linux x64 Build

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'Linux-Application/**'
      - '.github/workflows/linux-x64.yml'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'Linux-Application/**'
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-linux-x64:
    runs-on: ubuntu-22.04
    name: Linux x64 Build & Test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: System Information
      run: |
        echo "=== System Information ==="
        uname -a
        lsb_release -a
        echo "CPU Info:"
        lscpu | grep -E "(Architecture|CPU\(s\)|Thread|Model name)"
        echo "Memory Info:"
        free -h
        echo "=========================="
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          cmake \
          pkg-config \
          libusb-1.0-0-dev \
          libswresample-dev \
          libavutil-dev \
          qt6-base-dev \
          qt6-base-dev-tools \
          libqt6widgets6 \
          libqt6serialport6-dev
        
        # Verify package installations
        echo "=== Installed Versions ==="
        cmake --version
        pkg-config --version
        gcc --version | head -1
        echo "FFmpeg libraries:"
        pkg-config --modversion libswresample libavutil
        echo "Qt6 version:"
        qmake6 --version || qmake --version || echo "qmake not found"
        echo "=========================="
    
    - name: Configure CMake
      working-directory: Linux-Application
      run: |
        export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
        echo "PKG_CONFIG_PATH: $PKG_CONFIG_PATH"
        
        # Check library detection
        echo "=== Library Detection ==="
        pkg-config --exists libswresample && echo "✓ libswresample found" || echo "✗ libswresample not found"
        pkg-config --exists libavutil && echo "✓ libavutil found" || echo "✗ libavutil not found" 
        pkg-config --exists libusb-1.0 && echo "✓ libusb-1.0 found" || echo "✗ libusb-1.0 not found"
        
        echo "=== CMake Configuration ==="
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_VERBOSE_MAKEFILE=ON
    
    - name: Build
      working-directory: Linux-Application
      run: |
        cmake --build build --config Release -j$(nproc) --verbose
    
    - name: Test Executables
      working-directory: Linux-Application
      run: |
        echo "=== Testing Executables ==="
        
        # Check if executables exist
        ls -la build/DomesdayDuplicator/DomesdayDuplicator
        ls -la build/dddconv/dddconv
        ls -la build/dddutil/dddutil
        
        # Test version output
        echo "Testing DomesdayDuplicator:"
        build/DomesdayDuplicator/DomesdayDuplicator --version || echo "Version test failed"
        
        echo "Testing dddconv:"
        build/dddconv/dddconv --version || echo "Version test failed"
        
        echo "Testing dddutil:"
        build/dddutil/dddutil --version || echo "Version test failed"
        
        # Test help output
        echo "Testing help commands:"
        timeout 10 build/DomesdayDuplicator/DomesdayDuplicator --help || echo "Help test completed"
        timeout 10 build/dddconv/dddconv --help || echo "Help test completed"
        timeout 10 build/dddutil/dddutil --help || echo "Help test completed"
    
    - name: Check Dependencies
      working-directory: Linux-Application
      run: |
        echo "=== Checking Runtime Dependencies ==="
        echo "DomesdayDuplicator dependencies:"
        ldd build/DomesdayDuplicator/DomesdayDuplicator | grep -E "(Qt|usb|swresample|avutil)" || true
        
        echo "dddconv dependencies:"
        ldd build/dddconv/dddconv | grep -E "(Qt|usb|swresample|avutil)" || true
        
        echo "dddutil dependencies:"
        ldd build/dddutil/dddutil | grep -E "(Qt|usb|swresample|avutil)" || true
    
    - name: AudioResampler Test
      working-directory: Linux-Application
      run: |
        echo "=== Testing AudioResampler Functionality ==="
        
        # Create test program
        cat > test_resampler.cpp << 'EOF'
        #include "DomesdayDuplicator/AudioResampler.h"
        #include <iostream>
        #include <vector>
        #include <cmath>
        
        int main() {
            try {
                AudioResampler resampler;
                
                // Test initialization
                if (!resampler.initialize(48000, 24000, AV_SAMPLE_FMT_S16)) {
                    std::cerr << "Failed to initialize resampler" << std::endl;
                    return 1;
                }
                
                // Generate test sine wave (1000 samples at 48kHz)
                std::vector<int16_t> input_samples(1000);
                for (int i = 0; i < 1000; ++i) {
                    input_samples[i] = static_cast<int16_t>(16000 * sin(2 * M_PI * 440 * i / 48000.0));
                }
                
                // Perform downsampling
                std::vector<int16_t> output_samples;
                if (!resampler.resample(input_samples, output_samples)) {
                    std::cerr << "Resampling failed" << std::endl;
                    return 1;
                }
                
                // Check output
                std::cout << "Input samples: " << input_samples.size() << std::endl;
                std::cout << "Output samples: " << output_samples.size() << std::endl;
                
                // Expected roughly half the samples (48kHz -> 24kHz)
                double ratio = static_cast<double>(output_samples.size()) / input_samples.size();
                std::cout << "Sample ratio: " << ratio << std::endl;
                
                if (ratio > 0.4 && ratio < 0.6) {
                    std::cout << "✓ AudioResampler test PASSED" << std::endl;
                    return 0;
                } else {
                    std::cerr << "✗ AudioResampler test FAILED: unexpected ratio" << std::endl;
                    return 1;
                }
                
            } catch (const std::exception& e) {
                std::cerr << "Exception: " << e.what() << std::endl;
                return 1;
            }
        }
        EOF
        
        # Compile and run test
        g++ -std=c++17 -I. test_resampler.cpp build/DomesdayDuplicator/AudioResampler.o \
            $(pkg-config --cflags --libs libswresample libavutil) \
            -o test_resampler
        
        ./test_resampler
    
    - name: Package Artifacts
      working-directory: Linux-Application
      run: |
        mkdir -p artifacts/DomesdayDuplicator-Linux-x64
        cp build/DomesdayDuplicator/DomesdayDuplicator artifacts/DomesdayDuplicator-Linux-x64/
        cp build/dddconv/dddconv artifacts/DomesdayDuplicator-Linux-x64/
        cp build/dddutil/dddutil artifacts/DomesdayDuplicator-Linux-x64/
        cp DOWNSAMPLING_README.md artifacts/DomesdayDuplicator-Linux-x64/
        cp build_with_system_ffmpeg.sh artifacts/DomesdayDuplicator-Linux-x64/
        cp ../README.md artifacts/DomesdayDuplicator-Linux-x64/
        
        # Create version info file
        echo "Build Information:" > artifacts/DomesdayDuplicator-Linux-x64/BUILD_INFO.txt
        echo "Build Date: $(date)" >> artifacts/DomesdayDuplicator-Linux-x64/BUILD_INFO.txt
        echo "Platform: Linux x64 (Ubuntu 22.04)" >> artifacts/DomesdayDuplicator-Linux-x64/BUILD_INFO.txt
        echo "Commit: ${{ github.sha }}" >> artifacts/DomesdayDuplicator-Linux-x64/BUILD_INFO.txt
        echo "Branch: ${{ github.ref_name }}" >> artifacts/DomesdayDuplicator-Linux-x64/BUILD_INFO.txt
        
        tar -czf DomesdayDuplicator-Linux-x64.tar.gz -C artifacts DomesdayDuplicator-Linux-x64
        ls -la DomesdayDuplicator-Linux-x64.tar.gz
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DomesdayDuplicator-Linux-x64
        path: Linux-Application/DomesdayDuplicator-Linux-x64.tar.gz
        retention-days: 30
