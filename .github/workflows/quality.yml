name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Static analysis and linting
  static-analysis:
    runs-on: ubuntu-22.04
    name: Static Analysis
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          cmake \
          pkg-config \
          cppcheck \
          clang-tidy \
          clang-format \
          libusb-1.0-0-dev \
          libswresample-dev \
          libavutil-dev \
          qt6-base-dev \
          qt6-base-dev-tools \
          libqt6widgets6 \
          libqt6serialport6-dev
    
    - name: Run cppcheck
      working-directory: Linux-Application
      run: |
        echo "=== Running cppcheck ==="
        cppcheck --enable=all --inconclusive --xml --xml-version=2 \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --suppress=unmatchedSuppression \
          DomesdayDuplicator/ dddconv/ dddutil/ \
          2> cppcheck-results.xml || true
        
        # Show summary
        if [ -s cppcheck-results.xml ]; then
          echo "cppcheck found issues - see full log for details"
          grep -c "error\|warning\|style\|performance\|portability" cppcheck-results.xml || echo "No issues found"
        else
          echo "cppcheck completed successfully"
        fi
    
    - name: Check code formatting
      working-directory: Linux-Application
      run: |
        echo "=== Checking code formatting ==="
        # Create a basic .clang-format if it doesn't exist
        if [ ! -f .clang-format ]; then
          cat > .clang-format << EOF
        BasedOnStyle: LLVM
        IndentWidth: 4
        UseTab: Never
        ColumnLimit: 120
        AllowShortFunctionsOnASingleLine: Inline
        AllowShortIfStatementsOnASingleLine: true
        EOF
        fi
        
        # Check formatting (non-failing)
        find . -name "*.cpp" -o -name "*.h" | grep -E "(DomesdayDuplicator|dddconv|dddutil)" | head -10 | while read file; do
          echo "Checking formatting: $file"
          clang-format --dry-run --Werror "$file" 2>/dev/null || echo "  - Formatting issues found in $file"
        done
    
    - name: Documentation check
      working-directory: Linux-Application
      run: |
        echo "=== Documentation check ==="
        
        # Check for README files
        echo "Checking for documentation files..."
        [ -f "DOWNSAMPLING_README.md" ] && echo "✓ DOWNSAMPLING_README.md found" || echo "✗ DOWNSAMPLING_README.md missing"
        [ -f "../README.md" ] && echo "✓ README.md found" || echo "✗ README.md missing"
        
        # Check for build scripts
        [ -f "build_with_system_ffmpeg.sh" ] && echo "✓ Build script found" || echo "✗ Build script missing"
        
        # Check for essential headers having documentation
        echo "Checking header documentation..."
        if [ -f "DomesdayDuplicator/AudioResampler.h" ]; then
          if grep -q "/\*\*\|///" "DomesdayDuplicator/AudioResampler.h"; then
            echo "✓ AudioResampler.h has documentation comments"
          else
            echo "! AudioResampler.h could use more documentation comments"
          fi
        fi
    
    - name: Dependency check
      run: |
        echo "=== Dependency analysis ==="
        
        # Check CMakeLists.txt for proper dependency handling
        echo "Checking CMakeLists.txt files..."
        find Linux-Application -name "CMakeLists.txt" | while read cmake_file; do
          echo "Analyzing: $cmake_file"
          
          # Check for FFmpeg dependencies
          if grep -q "SWRESAMPLE\|AVUTIL" "$cmake_file"; then
            echo "  ✓ FFmpeg dependencies found"
          fi
          
          # Check for Qt dependencies  
          if grep -q "Qt6\|Qt::" "$cmake_file"; then
            echo "  ✓ Qt dependencies found"
          fi
          
          # Check for libusb dependencies
          if grep -q "LibUSB\|USB" "$cmake_file"; then
            echo "  ✓ USB dependencies found"
          fi
        done
    
    - name: Security check
      working-directory: Linux-Application
      run: |
        echo "=== Basic security checks ==="
        
        # Check for common security issues
        echo "Checking for potential security issues..."
        
        # Buffer operations
        if grep -r "strcpy\|strcat\|sprintf\|gets" DomesdayDuplicator/ dddconv/ dddutil/ --include="*.cpp" --include="*.h"; then
          echo "⚠ Found potentially unsafe string functions"
        else
          echo "✓ No unsafe string functions found"
        fi
        
        # System calls
        if grep -r "system(" DomesdayDuplicator/ dddconv/ dddutil/ --include="*.cpp" --include="*.h"; then
          echo "⚠ Found system() calls - verify they're safe"
        else
          echo "✓ No system() calls found"
        fi
        
        # File operations
        echo "Checking file operations..."
        grep -r "fopen\|ifstream\|ofstream" DomesdayDuplicator/ --include="*.cpp" --include="*.h" | wc -l | xargs echo "File operations found:"

  # Build configuration validation
  build-config-test:
    runs-on: ubuntu-22.04
    name: Build Configuration Test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          cmake \
          pkg-config \
          libusb-1.0-0-dev \
          libswresample-dev \
          libavutil-dev \
          qt6-base-dev \
          qt6-base-dev-tools \
          libqt6widgets6 \
          libqt6serialport6-dev
    
    - name: Test different build configurations
      working-directory: Linux-Application
      run: |
        echo "=== Testing Debug build ==="
        export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
        
        # Test Debug build
        cmake -B build-debug -S . -DCMAKE_BUILD_TYPE=Debug
        cmake --build build-debug --config Debug -j2
        
        echo "=== Testing Release build ==="
        # Test Release build  
        cmake -B build-release -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build-release --config Release -j2
        
        echo "=== Testing system library detection ==="
        # Test with explicit PKG_CONFIG_PATH
        rm -rf build-test
        PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig" \
        cmake -B build-test -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build-test --config Release -j2
        
        echo "=== Verifying executables ==="
        for build_dir in build-debug build-release build-test; do
          echo "Testing executables in $build_dir:"
          "$build_dir/DomesdayDuplicator/DomesdayDuplicator" --version || echo "  DomesdayDuplicator version check failed"
          "$build_dir/dddconv/dddconv" --version || echo "  dddconv version check failed"
          "$build_dir/dddutil/dddutil" --version || echo "  dddutil version check failed"
        done

  # Cross-platform compatibility check
  compatibility-check:
    strategy:
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    name: Compatibility Test (${{ matrix.os }})
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          cmake \
          pkg-config \
          libusb-1.0-0-dev \
          libswresample-dev \
          libavutil-dev \
          qt6-base-dev \
          qt6-base-dev-tools \
          libqt6widgets6 \
          libqt6serialport6-dev
    
    - name: Check system info
      run: |
        echo "=== System Information ==="
        echo "OS: ${{ matrix.os }}"
        lsb_release -a || echo "lsb_release not available"
        echo "FFmpeg versions:"
        pkg-config --modversion libswresample libavutil
        echo "Qt version:"
        qmake6 --version || qmake --version || echo "qmake not found"
        echo "=========================="
    
    - name: Build and test
      working-directory: Linux-Application
      run: |
        export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release -j$(nproc)
        
        # Quick functionality test
        echo "Testing applications..."
        build/DomesdayDuplicator/DomesdayDuplicator --help
        build/dddconv/dddconv --help  
        build/dddutil/dddutil --help
