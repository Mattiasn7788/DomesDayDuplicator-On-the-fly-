name: Code Quality

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

jobs:
  code-quality:
    runs-on: ubuntu-22.04
    name: Code Quality Analysis
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Analysis Tools
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          cmake \
          pkg-config \
          cppcheck \
          clang-format \
          libusb-1.0-0-dev \
          libswresample-dev \
          libavutil-dev \
          qt6-base-dev \
          qt6-base-dev-tools \
          libqt6widgets6 \
          libqt6serialport6-dev
    
    - name: Build for Analysis
      working-directory: Linux-Application
      run: |
        export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        cmake --build build --config Debug -j$(nproc)
    
    - name: Run cppcheck
      working-directory: Linux-Application
      run: |
        echo "=== Running cppcheck Static Analysis ==="
        cppcheck --enable=warning,style,performance,portability \
          --inconclusive \
          --project=build/compile_commands.json \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --suppress=unmatchedSuppression \
          DomesdayDuplicator/ dddconv/ dddutil/ \
          --error-exitcode=0 \
          2>&1 | tee cppcheck-results.txt
        
        if [ -s cppcheck-results.txt ]; then
          echo "cppcheck completed - see results above"
        else
          echo "cppcheck found no issues"
        fi
    
    - name: Check Code Formatting
      working-directory: Linux-Application
      run: |
        echo "=== Code Formatting Check ==="
        
        # Create basic .clang-format if missing
        if [ ! -f .clang-format ]; then
          cat > .clang-format << 'EOF'
        BasedOnStyle: LLVM
        IndentWidth: 4
        UseTab: Never
        ColumnLimit: 120
        AllowShortFunctionsOnASingleLine: Inline
        AllowShortIfStatementsOnASingleLine: true
        EOF
        fi
        
        # Check a sample of files
        echo "Checking code formatting on key files..."
        find DomesdayDuplicator/ -name "*.cpp" -o -name "*.h" | head -5 | while read file; do
          echo "Checking: $file"
          clang-format --dry-run --Werror "$file" 2>/dev/null && echo "  ✓ Good formatting" || echo "  ⚠ Formatting could be improved"
        done
    
    - name: Verify AudioResampler Integration
      working-directory: Linux-Application
      run: |
        echo "=== AudioResampler Integration Check ==="
        
        # Check that AudioResampler is properly integrated
        if [ -f "DomesdayDuplicator/AudioResampler.h" ] && [ -f "DomesdayDuplicator/AudioResampler.cpp" ]; then
          echo "✓ AudioResampler files found"
          
          # Check for FFmpeg includes
          if grep -q "extern \"C\"" DomesdayDuplicator/AudioResampler.h; then
            echo "✓ FFmpeg C bindings found"
          fi
          
          # Check for swresample usage
          if grep -q "swr_" DomesdayDuplicator/AudioResampler.cpp; then
            echo "✓ libswresample usage found"
          fi
          
          # Verify it compiled correctly
          if [ -f "build/DomesdayDuplicator/AudioResampler.o" ]; then
            echo "✓ AudioResampler compiled successfully"
          fi
          
        else
          echo "✗ AudioResampler files missing"
        fi
    
    - name: Documentation Check
      run: |
        echo "=== Documentation Check ==="
        
        # Check for essential documentation
        [ -f "README.md" ] && echo "✓ README.md found" || echo "✗ README.md missing"
        [ -f "Linux-Application/DOWNSAMPLING_README.md" ] && echo "✓ DOWNSAMPLING_README.md found" || echo "✗ DOWNSAMPLING_README.md missing"
        [ -f "Linux-Application/build_with_system_ffmpeg.sh" ] && echo "✓ Build script found" || echo "✗ Build script missing"
        
        # Check .gitignore is comprehensive
        if [ -f ".gitignore" ]; then
          echo "✓ .gitignore found"
          if grep -q "build/" .gitignore && grep -q "*.o" .gitignore; then
            echo "✓ .gitignore includes build artifacts"
          fi
        fi
    
    - name: Security Scan
      working-directory: Linux-Application
      run: |
        echo "=== Basic Security Scan ==="
        
        # Check for potentially unsafe functions
        echo "Scanning for unsafe functions..."
        if grep -r "strcpy\|strcat\|sprintf\|gets" DomesdayDuplicator/ dddconv/ dddutil/ --include="*.cpp" --include="*.h"; then
          echo "⚠ Found potentially unsafe string functions - review for buffer safety"
        else
          echo "✓ No obviously unsafe string functions found"
        fi
        
        # Check for system() calls
        if grep -r "system(" DomesdayDuplicator/ dddconv/ dddutil/ --include="*.cpp" --include="*.h"; then
          echo "⚠ Found system() calls - verify input sanitization"
        else
          echo "✓ No system() calls found"
        fi
        
        echo "Security scan completed"
    
    - name: Upload Analysis Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: code-quality-results
        path: |
          Linux-Application/cppcheck-results.txt
          Linux-Application/.clang-format
        retention-days: 30
